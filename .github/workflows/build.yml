name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
          
      - name: Build for Windows
        run: cargo build --release
        
      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: PresentationTimer-Windows
          path: target/release/presentation-timer.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build for macOS
        run: cargo build --release
        
      - name: Package macOS App
        run: |
          chmod +x package_mac.sh
          ./package_mac.sh
          # 패키징된 앱을 zip으로 압축
          cd ~/Desktop
          zip -r PresentationTimer-macOS.zip PresentationTimer.app
          
      - name: Upload macOS App
        uses: actions/upload-artifact@v4
        with:
          name: PresentationTimer-macOS
          path: ~/Desktop/PresentationTimer-macOS.zip

  create-release:
    name: Create Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: PresentationTimer-Windows
          path: ./artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: PresentationTimer-macOS
          path: ./artifacts/macos

      - name: Prepare assets for release
        run: |
          mkdir release_assets
          # Windows 실행 파일 이동 및 이름 변경
          mv ./artifacts/windows/presentation-timer.exe ./release_assets/PresentationTimer.exe
          # macOS zip 이동
          mv ./artifacts/macos/PresentationTimer-macOS.zip ./release_assets/PresentationTimer-macOS.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/PresentationTimer.exe
            release_assets/PresentationTimer-macOS.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-brew:
    name: Update Homebrew Cask
    needs: create-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: PresentationTimer-macOS
          path: ./artifacts/macos

      - name: Calculate SHA256 and Version
        id: shasum
        run: |
          SHA256=$(sha256sum ./artifacts/macos/PresentationTimer-macOS.zip | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update Cask in Tap Repository
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SHA256: ${{ steps.shasum.outputs.sha256 }}
          VERSION: ${{ steps.shasum.outputs.version }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN 이 설정되지 않았습니다. 자동 Homebrew Cask 업데이트를 건너뜁니다."
            echo "Tip: GitHub Settings -> Secrets and variables -> Actions 에 'HOMEBREW_TAP_TOKEN' 명칭으로 퍼블릭 homebrew-tap 저장소 쓰기 권한을 지닌 PAT(Personal Access Token)을 등록해두시면 자동 배포됩니다."
            exit 0
          fi
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # saintpbh/homebrew-tap 저장소를 체크아웃
          git clone https://x-access-token:${TAP_TOKEN}@github.com/saintpbh/homebrew-tap.git tap-repo
          cd tap-repo
          mkdir -p Casks
          
          # Cask 정의 파일 덮어쓰기
          cat <<EOF > Casks/presentation-timer.rb
cask "presentation-timer" do
  version "${VERSION}"
  sha256 "${SHA256}"

  url "https://github.com/saintpbh/timmer/releases/download/v#{version}/PresentationTimer-macOS.zip"
  name "Presentation Timer"
  desc "Presentation Overlay Timer with multi-platform click-through support"
  homepage "https://github.com/saintpbh/timmer"

  app "PresentationTimer.app"

  zap trash: [
    "~/Library/Application Support/PresentationTimer",
    "~/Library/Preferences/com.saintpbh.presentation-timer.plist",
  ]
end
EOF
          git add Casks/presentation-timer.rb
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump presentation-timer to v${VERSION}"
            git push origin main
          else
            echo "Cask 파일의 내용 변화가 없어 커밋을 생략합니다."
          fi
